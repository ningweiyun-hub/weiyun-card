const loadSurvey = () => {
  try {

    const raw = localStorage.getItem(SURVEY_KEY);

    return Array.isArray(arr) ? arr : [];

};

const clearSurvey = () => {
  try { localStorage.removeItem(SURVEY_KEY); } catch (e) { /* ignore */ }
};

/* Production replacement for the prototype-only <image-slot> web component.
   Click or drag-and-drop an image file to fill it; shows a calm placeholder
   until filled. Object-fit: cover, rounded per the blog cover spec. */
function ImageSlot({ placeholder = 'Add a cover image', radius = 14, aspectRatio = '16 / 9' }) {
  const [src, setSrc] = React.useState(null);
  const [over, setOver] = React.useState(false);
  const inputRef = React.useRef(null);

  function read(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = () => setSrc(r.result);
    r.readAsDataURL(file);
  }

  return (
    <div
      onClick={() => inputRef.current?.click()}
      onDragOver={(e) => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={(e) => { e.preventDefault(); setOver(false); read(e.dataTransfer.files?.[0]); }}
      style={{
        width: '100%', aspectRatio, display: 'block', marginBottom: 40,
        borderRadius: radius, overflow: 'hidden', cursor: 'pointer',
        background: src ? 'transparent' : 'var(--surface-sunken)',
        border: src ? '1px solid var(--border-default)'
                    : `1px dashed ${over ? 'var(--neve-dust-blue)' : 'var(--border-strong)'}`,
        transition: 'var(--transition-fast)',
      }}>
      {src ? (
        <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
      ) : (
        <div style={{
          width: '100%', height: '100%', display: 'grid', placeItems: 'center',
          fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--text-muted)',
          textAlign: 'center', padding: 24,
        }}>{placeholder}</div>
      )}
      <input ref={inputRef} type="file" accept="image/*" hidden
        onChange={(e) => read(e.target.files?.[0])} />
    </div>
  );
}

/* Welcome canvas — fusing colour blocks. Soft brand-coloured blobs drift across
   the paper, bounce off the edges, and gently pull together when they overlap so
   they read as merging, irregular blocks. Every second each blob gets a small
   random impulse so the motion never settles. Clicking pushes the nearby blocks
   outward. Palette is the NEVE design system. */

function ParticleFigure({ onEnter }) {
  const canvasRef = React.useRef(null);
  const [revealed, setRevealed] = React.useState(false);
  const [armed, setArmed] = React.useState(false);
  const blobsRef = React.useRef([]);
  const clickRef = React.useRef(null);

  const { Button } = window.NEVEDesignSystem_bf520b || {};

  // NEVE palette (rgb triplets), weighted warm + calm; ink used sparingly for depth.
  const PALETTE = [
    '76,107,138',   // dust-blue
    '184,180,216',  // soft-lavender
    '224,122,95',   // clay-orange
    '242,196,141',  // muted-amber
    '107,127,107',  // moss-green
    '30,41,59',     // ink-700 (depth)
  ];

  function handleClick(e) {
    const c = canvasRef.current;
    if (!c) return;
    const r = c.getBoundingClientRect();
    clickRef.current = { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  React.useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let raf, W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // soft round sprite per colour — solid-ish core, transparent edge → blocks
    // that visually fuse where they overlap.
    const spriteCache = {};
    function sprite(rgb) {
      if (spriteCache[rgb]) return spriteCache[rgb];
      const s = document.createElement('canvas');
      s.width = s.height = 256;
      const g = s.getContext('2d');
      const grad = g.createRadialGradient(128, 128, 0, 128, 128, 128);
      grad.addColorStop(0, `rgba(${rgb},0.92)`);
      grad.addColorStop(0.55, `rgba(${rgb},0.80)`);
      grad.addColorStop(0.82, `rgba(${rgb},0.36)`);
      grad.addColorStop(1, `rgba(${rgb},0)`);
      g.fillStyle = grad;
      g.fillRect(0, 0, 256, 256);
      spriteCache[rgb] = s;
      return s;
    }

    function build() {
      W = canvas.clientWidth; H = canvas.clientHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const base = Math.min(W, H);
      if (blobsRef.current.length === 0) {
        const N = 6;
        blobsRef.current = Array.from({ length: N }, (_, i) => {
          const a = Math.random() * Math.PI * 2;
          const speed = base * 0.00016 * (0.5 + Math.random());
          return {
            x: 0.16 * W + Math.random() * 0.68 * W,
            y: 0.16 * H + Math.random() * 0.68 * H,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            r: base * (0.14 + Math.random() * 0.09),
            rgb: PALETTE[i % PALETTE.length],
            // irregular shape: a few offset sub-lobes that wobble
            lobes: Array.from({ length: 3 }, () => ({
              ang: Math.random() * Math.PI * 2,
              dist: Math.random() * 0.42,
              sc: 0.55 + Math.random() * 0.42,
              wob: Math.random() * Math.PI * 2,
            })),
          };
        });
      }
    }

    let last = performance.now(), kickAcc = 0;
    function step(now) {
      const dt = Math.min(40, now - last); last = now;
      const base = Math.min(W, H);
      const blobs = blobsRef.current;

      // ~every second: a small random impulse to keep things lively
      kickAcc += dt;
      if (kickAcc > 1000) {
        kickAcc = 0;
        for (const b of blobs) {
          const a = Math.random() * Math.PI * 2;
          const k = base * 0.00010 * (0.4 + Math.random());
          b.vx += Math.cos(a) * k; b.vy += Math.sin(a) * k;
        }
      }

      // click → push nearby blocks outward
      if (clickRef.current) {
        const { x, y } = clickRef.current; clickRef.current = null;
        for (const b of blobs) {
          const dx = b.x - x, dy = b.y - y, d = Math.hypot(dx, dy) || 1;
          const f = Math.max(0, 1 - d / (base * 0.7)) * base * 0.013;
          b.vx += (dx / d) * f; b.vy += (dy / d) * f;
        }
      }

      // pairwise: when blocks overlap, a gentle nudge so they meet and fuse
      for (let i = 0; i < blobs.length; i++) {
        for (let j = i + 1; j < blobs.length; j++) {
          const a = blobs[i], b = blobs[j];
          const dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy) || 1;
          const min = (a.r + b.r) * 0.6;
          if (d < min) {
            const nx = dx / d, ny = dy / d, push = (min - d) * 0.0035;
            a.vx -= nx * push; a.vy -= ny * push;
            b.vx += nx * push; b.vy += ny * push;
          }
        }
      }

      const damp = 0.99;
      const minSp = base * 0.00006;
      for (const b of blobs) {
        b.x += b.vx * dt; b.y += b.vy * dt;
        b.vx *= damp; b.vy *= damp;
        const m = b.r * 0.45;
        if (b.x < m) { b.x = m; b.vx = Math.abs(b.vx); }
        if (b.x > W - m) { b.x = W - m; b.vx = -Math.abs(b.vx); }
        if (b.y < m) { b.y = m; b.vy = Math.abs(b.vy); }
        if (b.y > H - m) { b.y = H - m; b.vy = -Math.abs(b.vy); }
        // never fully freeze
        if (Math.hypot(b.vx, b.vy) < minSp) {
          const a = Math.random() * Math.PI * 2;
          b.vx += Math.cos(a) * minSp; b.vy += Math.sin(a) * minSp;
        }
      }
    }

    function draw(now) {
      ctx.clearRect(0, 0, W, H);
      const blobs = blobsRef.current;
      ctx.globalCompositeOperation = 'source-over';
      for (const b of blobs) {
        const img = sprite(b.rgb);
        ctx.globalAlpha = 0.5;
        for (const lo of b.lobes) {
          const wob = 1 + Math.sin(now * 0.0006 + lo.wob) * 0.12;
          const rad = Math.max(8, b.r * lo.sc * wob);
          const ox = Math.cos(lo.ang) * lo.dist * b.r;
          const oy = Math.sin(lo.ang) * lo.dist * b.r;
          ctx.drawImage(img, b.x + ox - rad, b.y + oy - rad, rad * 2, rad * 2);
        }
      }
      ctx.globalAlpha = 1;
    }

    // Driver: rAF plus a stall-detector for throttled/offscreen iframes.
    let stop = false, lastTick = performance.now();
    function rafLoop(now) {
      if (stop) return;
      lastTick = performance.now();
      if (!reduce) step(now);
      draw(now);
      raf = requestAnimationFrame(rafLoop);
    }
    build();
    raf = requestAnimationFrame(rafLoop);
    const stallGuard = setInterval(() => {
      if (stop) return;
      if (performance.now() - lastTick > 120) {
        lastTick = performance.now();
        const n = performance.now();
        if (!reduce) step(n);
        draw(n);
      }
    }, 33);
    const tReveal = setTimeout(() => setRevealed(true), reduce ? 200 : 1100);
    const tArm = setTimeout(() => setArmed(true), reduce ? 400 : 1700);
    const onResize = () => build();
    window.addEventListener('resize', onResize);
    return () => {
      stop = true;
      cancelAnimationFrame(raf);
      clearInterval(stallGuard);
      clearTimeout(tReveal);
      clearTimeout(tArm);
      window.removeEventListener('resize', onResize);
    };
  }, []);

  return (
    <div
      onClick={handleClick}
      style={{
        position: 'absolute', inset: 0, overflow: 'hidden',
        background: 'radial-gradient(120% 90% at 50% 18%, #FBFAF8 0%, var(--neve-warm-ivory) 60%, #EFEBE5 100%)',
      }}
    >
      <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} />

      <div style={{
        position: 'absolute', left: 0, right: 0, top: '50%', transform: 'translateY(-50%)',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
        textAlign: 'center', pointerEvents: 'none', padding: '0 24px',
        opacity: revealed ? 1 : 0,
        transition: 'opacity 900ms var(--ease-calm)',
      }}>
        <div className="neve-eyebrow" style={{ color: 'var(--neve-dust-blue)', textShadow: '0 1px 16px rgba(247,245,242,0.95)' }}>This is a person, not a homepage</div>
        <h1 style={{
          margin: 0, fontFamily: 'var(--font-display)', fontWeight: 400,
          fontSize: 'clamp(40px, 7vw, 76px)', lineHeight: 1.04,
          letterSpacing: '-0.01em', color: 'var(--neve-ink-navy)', textWrap: 'pretty',
          textShadow: '0 2px 22px rgba(247,245,242,0.92)',
        }}>Welcome to Wei-Yun Neve Ning's space</h1>
        <div style={{
          fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--text-muted)',
          textShadow: '0 1px 16px rgba(247,245,242,0.95)',
        }}>Click anywhere — nudge the colours.</div>
        <div
          onClick={(e) => e.stopPropagation()}
          style={{
            marginTop: 12, pointerEvents: armed ? 'auto' : 'none',
            opacity: armed ? 1 : 0, transition: 'opacity 600ms var(--ease-calm)',
          }}
        >
          {Button ? <Button variant="primary" size="lg" onClick={onEnter}>Come in</Button> : null}
        </div>
      </div>
    </div>
  );
}

/* Renders a text block: blank-line-separated paragraphs, plus consecutive
   lines starting with "• " grouped into a bullet list. */
function RichText({ text, size, lineHeight, marginBottom = 16 }) {
  const lines = String(text).split('\n');
  const blocks = [];
  let para = [], bullets = [];
  const flushPara = () => { if (para.length) { blocks.push({ type: 'p', text: para.join(' ') }); para = []; } };
  const flushBullets = () => { if (bullets.length) { blocks.push({ type: 'ul', items: bullets.slice() }); bullets = []; } };
  for (const raw of lines) {
    const line = raw.replace(/\t/g, ' ').trim();
    if (!line) { flushPara(); flushBullets(); continue; }
    const m = line.match(/^[••]\s*(.*)$/);
    if (m) { flushPara(); bullets.push(m[1]); }
    else { flushBullets(); para.push(line); }
  }
  flushPara(); flushBullets();

  const pStyle = {
    margin: `0 0 ${marginBottom}px`, fontFamily: 'var(--font-body)', fontSize: size,
    lineHeight, color: 'var(--text-secondary)', textWrap: 'pretty',
  };
  return blocks.map((b, i) => b.type === 'ul' ? (
    <ul key={i} style={{ ...pStyle, paddingLeft: 22 }}>
      {b.items.map((it, j) => <li key={j} style={{ marginBottom: 6 }}>{it}</li>)}
    </ul>
  ) : (
    <p key={i} style={pStyle}>{b.text}</p>
  ));
}

/* ============================================================================
   Role animations — six looping "identity" scenes (React + inline SVG, no deps).
   Ported from the NEVE design handoff. Renamed colour tokens NEVE → RAC to avoid
   clashing with the design-system object already named NEVE in this file; hooks
   use React.* so nothing is re-declared when the modules are concatenated into
   the no-build bundle.
   ========================================================================== */
const RAC = {
  ink: '#0F172A', ink300: '#94A3B8', dust: '#4C6B8A', moss: '#6B7F6B',
  ivory: '#F7F5F2', ivoryD: '#EFEBE5', stone: '#E5E7EB', white: '#FFFFFF',
  amber: '#F2C48D', amberD: '#D99A4E', clay: '#E07A5F', lav: '#B8B4D8',
};
const RA_SANS = 'Inter, system-ui, sans-serif';
const ra_clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const RA_Easing = {
  easeOutCubic: (t) => (--t) * t * t + 1,
  easeInCubic: (t) => t * t * t,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeOutBack: (t) => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); },
};
function ra_pp(t, a, b, ease) {
  const r = ra_clamp((b - a) === 0 ? 0 : (t - a) / (b - a), 0, 1);
  return ease ? ease(r) : r;
}
function ra_fade(localTime, dur) {
  const inT = ra_pp(localTime, 0, 0.45, RA_Easing.easeOutCubic);
  const outT = ra_pp(localTime, dur - 0.4, dur, RA_Easing.easeInCubic);
  return inT * (1 - outT);
}

// 6 — Exhibition strategy designer: floor plan + visitor route
function ra_alongPath(pts, f) {
  let total = 0; const segs = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const len = Math.hypot(pts[i+1][0]-pts[i][0], pts[i+1][1]-pts[i][1]);
    segs.push(len); total += len;
  }
  let d = f * total;
  for (let i = 0; i < segs.length; i++) {
    if (d <= segs[i]) { const r = segs[i] ? d/segs[i] : 0; const a = pts[i], b = pts[i+1]; return [a[0]+(b[0]-a[0])*r, a[1]+(b[1]-a[1])*r]; }
    d -= segs[i];
  }
  return pts[pts.length-1];
}
function SceneExhibition({ s }) {
  const t = s.localTime;
  const plan = ra_pp(t, 0.35, 0.85, RA_Easing.easeOutCubic);
  const walls = ra_pp(t, 0.7, 1.15, RA_Easing.easeOutCubic);
  const art = ra_pp(t, 1.0, 1.55, RA_Easing.easeOutBack);
  const route = ra_pp(t, 1.4, 2.45, RA_Easing.easeInOutCubic);
  const pts = [[70,222],[70,80],[200,80],[200,170],[340,170],[340,80],[450,80],[450,222]];
  const routeD = 'M ' + pts.map(p => p.join(' ')).join(' L ');
  const dot = ra_alongPath(pts, route);
  const frames = [
    { x:118, y:46, w:40, h:12, c:RAC.clay },
    { x:248, y:46, w:40, h:12, c:RAC.dust },
    { x:384, y:46, w:40, h:12, c:RAC.amberD },
    { x:46, y:120, w:12, h:34, c:RAC.moss },
    { x:462, y:120, w:12, h:34, c:RAC.lav },
  ];
  return (
    <div style={{ position: 'relative', width: 520, height: 300 }}>
      <svg width="520" height="300" viewBox="0 0 520 300">
        <rect x="40" y="40" width="440" height="220" rx="6" fill={RAC.white} stroke={RAC.stone} strokeWidth="2"
          opacity={plan} transform={`scale(${0.96 + plan*0.04})`} style={{ transformOrigin: '260px 150px' }}/>
        <g stroke={RAC.ink} strokeWidth="5" strokeLinecap="round" opacity={walls}>
          <line x1="200" y1="40" x2="200" y2="130" />
          <line x1="340" y1="170" x2="340" y2="260" />
        </g>
        {frames.map((f, i) => (
          <rect key={i} x={f.x} y={f.y} width={f.w} height={f.h} rx="2" fill={f.c}
            opacity={art} transform={`scale(${art})`} style={{ transformOrigin: `${f.x+f.w/2}px ${f.y+f.h/2}px` }}/>
        ))}
        <path d={routeD} fill="none" stroke={RAC.dust} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
          pathLength="1" strokeDasharray="1" strokeDashoffset={1 - route} opacity={0.9}/>
        <circle cx="70" cy="222" r="5.5" fill={RAC.ink} opacity={plan}/>
        {route > 0.02 && (
          <g>
            <circle cx={dot[0]} cy={dot[1]} r="13" fill={RAC.clay} opacity={0.16}/>
            <circle cx={dot[0]} cy={dot[1]} r="6.5" fill={RAC.clay} stroke={RAC.white} strokeWidth="2"/>
          </g>
        )}
      </svg>
    </div>
  );
}

// A looping rAF playhead in seconds; freezes to a settled frame when the user
// prefers reduced motion.
function useReelClock(total) {
  const [t, setT] = React.useState(0);
  const raf = React.useRef(null);
  React.useEffect(() => {
    const reduce = typeof window !== 'undefined' && window.matchMedia
      && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) { setT(total * 0.7); return; }
    let last = null;
    const step = (ts) => {
      if (last == null) last = ts;
      const dt = (ts - last) / 1000; last = ts;
      setT((p) => (p + dt) % total);
      raf.current = requestAnimationFrame(step);
    };
    raf.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf.current);
  }, [total]);
  return t;
}

// One role scene on its own loop, centred in a fixed stage.
function RoleScene({ animKey, loopDuration = 2.9, width, height }) {
  const t = useReelClock(loopDuration);
  const Comp = RA_SCENES[animKey] || SceneProductDesigner;
  return (
    <div style={{ position: 'relative', width, height, overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ opacity: ra_fade(t, loopDuration), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Comp s={{ localTime: t }} />
      </div>
    </div>
  );
}

// Fills a card's media slot with the looping scene: ivory canvas (the scenes are
// drawn for a light ground), with the fixed 560×340 stage scaled to fit the slot.
const RA_STAGE_W = 560, RA_STAGE_H = 340;
function RoleAnimatedMedia({ animKey }) {
  const ref = React.useRef(null);
  const [w, setW] = React.useState(300);
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    const update = () => setW(el.clientWidth || 300);
    update();
    let ro;
    if (typeof ResizeObserver !== 'undefined') { ro = new ResizeObserver(update); ro.observe(el); }
    else if (typeof window !== 'undefined') { window.addEventListener('resize', update); }
    return () => { if (ro) ro.disconnect(); else if (typeof window !== 'undefined') window.removeEventListener('resize', update); };
  }, []);
  const scale = w / RA_STAGE_W;
  return (
    <div ref={ref} style={{
      position: 'absolute', inset: 0, background: 'var(--neve-ivory-deep)', overflow: 'hidden',
      borderBottom: '1px solid rgba(15,23,42,0.06)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div style={{ width: RA_STAGE_W, height: RA_STAGE_H, flex: '0 0 auto', transform: `scale(${scale})`, transformOrigin: 'center center' }}>
        <RoleScene animKey={animKey} width={RA_STAGE_W} height={RA_STAGE_H} />
      </div>
    </div>
  );
}

function Duotone({ duo, id, cover, alt }) {
  if (cover) {

  // No image yet — show the role's looping identity animation.
  return <RoleAnimatedMedia animKey={ROLE_ANIM[id] || 'product-designer'} />;
}

function RoleCard({ role, onChoose }) {
  const [hover, setHover] = React.useState(false);
  const [flipped, setFlipped] = React.useState(false); // touch: 1st tap flips, 2nd enters
  const touch = React.useRef(false);
  const canHover = React.useMemo(
    () => !(typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(hover: none)').matches),
    []);
  const flip = hover || flipped;
  const onPointerDown = (e) => { touch.current = e.pointerType === 'touch'; };
  const activate = () => {
    // On touch, the first tap reveals the back; only the second tap enters.
    if (touch.current && !flipped) { setFlipped(true); return; }
    onChoose(role);
  };
  const faceBase = {
    position: 'absolute', inset: 0, backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
    borderRadius: 'var(--radius-lg)', overflow: 'hidden', border: '1px solid var(--border-default)',
  };
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      onPointerDown={onPointerDown}
      onClick={activate}
      style={{
        flex: '0 0 auto', width: 'clamp(248px, 74vw, 300px)', height: 452, scrollSnapAlign: 'center',
        cursor: 'pointer', userSelect: 'none', perspective: 1500,
      }}>
      {/* flipper */}
      <div style={{
        position: 'relative', width: '100%', height: '100%',
        transformStyle: 'preserve-3d', transition: 'transform 640ms var(--ease-calm)',
        transform: flip ? 'rotateY(180deg)' : 'rotateY(0deg)',

      }}>
        {/* FRONT */}
        <div style={{ ...faceBase, display: 'flex', flexDirection: 'column', background: 'var(--surface-card)' }}>
          <div style={{ position: 'relative', width: '100%', height: 248, flexShrink: 0, overflow: 'hidden' }}>
            <Duotone duo={role.duo} id={role.id} cover={role.cover} alt={role.title} />
          </div>

            <h3 style={{
              margin: '8px 0 0', fontFamily: 'var(--font-display)', fontWeight: 400,

            }}>{role.title}</h3>
            <div style={{

              color: 'var(--text-muted)',
            }}>
              {canHover ? 'Hover to flip' : 'Tap to flip'} <Arrow />

        {/* BACK */}
        <div style={{
          ...faceBase, transform: 'rotateY(180deg)',
          display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
          padding: '30px 26px', background: role.duo[0], borderColor: role.duo[0],
        }}>
          <div>
            <div className="neve-eyebrow" style={{ color: 'rgba(247,245,242,0.62)' }}>{role.eyebrow}</div>
            <h3 style={{
              margin: '12px 0 16px', fontFamily: 'var(--font-display)', fontWeight: 400,
              fontSize: 28, lineHeight: 1.08, color: 'var(--neve-warm-ivory)',

            <p style={{

          </div>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 7,

}

function IdentityDeck({ onChoose }) {
  const trackRef = React.useRef(null);
  const drag = React.useRef({ down: false, x: 0, left: 0, moved: false });

  function scrollByCard(dir) {
    const t = trackRef.current;
    if (!t) return;
    const card = t.querySelector('[data-rolecard]');
    const step = card ? card.offsetWidth + 20 : 320;
    t.scrollBy({ left: dir * step, behavior: 'smooth' });
  }

  // pointer-drag to scroll
  React.useEffect(() => {
    const t = trackRef.current;
    if (!t) return;
    const down = (e) => { drag.current = { down: true, x: e.clientX, left: t.scrollLeft, moved: false }; };
    const move = (e) => {
      if (!drag.current.down) return;
      const dx = e.clientX - drag.current.x;
      if (Math.abs(dx) > 4) drag.current.moved = true;
      t.scrollLeft = drag.current.left - dx;
    };
    const up = () => { drag.current.down = false; };
    t.addEventListener('pointerdown', down);
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    return () => { t.removeEventListener('pointerdown', down); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
  }, []);

  return (
    <div data-screen-label="Identity deck" className="neve-rise" style={{
      position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
      background: 'radial-gradient(120% 90% at 50% 0%, #FBFAF8 0%, var(--neve-warm-ivory) 70%)',
      overflowY: 'auto', overflowX: 'hidden',
    }}>
      <div style={{
        padding: 'clamp(76px, 9vh, 96px) 24px 0', maxWidth: 760, margin: '0 auto',
        textAlign: 'center',
      }}>
        <div className="neve-eyebrow" style={{ color: 'var(--neve-dust-blue)' }}>Choose your way in</div>
        <h2 style={{
          margin: '12px 0 10px', fontFamily: 'var(--font-display)', fontWeight: 400,
          fontSize: 'clamp(30px, 5vw, 46px)', lineHeight: 1.06, color: 'var(--neve-ink-navy)',
        }}>Which version of me do you need?</h2>
        <p style={{
          margin: 0, fontFamily: 'var(--font-body)', fontSize: 16, lineHeight: 1.5,
          color: 'var(--text-secondary)',
        }}>Hover a card to see what's inside, then pick the one that fits why you came.</p>
      </div>

      <div style={{ flex: '1 0 auto', display: 'flex', alignItems: 'center', minHeight: 0 }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 16, width: '100%',
          maxWidth: 1200, margin: '0 auto', padding: '0 clamp(12px, 4vw, 40px)',
        }}>
          <button className="neve-navbtn deck-arrow" onClick={() => scrollByCard(-1)} aria-label="Previous">
            <Arrow dir="left" />
          </button>
          <div ref={trackRef} style={{
            flex: 1, display: 'flex', gap: 20, overflowX: 'auto', padding: '28px 4px 32px',
            scrollSnapType: 'x mandatory', scrollbarWidth: 'none', cursor: 'grab',
          }}>
            {ROLES.map((r) => (
              <div data-rolecard key={r.id} onClickCapture={(e) => { if (drag.current.moved) { e.stopPropagation(); } }}>
                <RoleCard role={r} onChoose={onChoose} />
              </div>
            ))}
            <div aria-hidden="true" style={{
              flex: '0 0 auto', width: 1, alignSelf: 'stretch',
              background: 'var(--border-strong)', margin: '12px 6px', opacity: 0.6,
            }}></div>
            {COMING_SOON.map((cs) => <ComingSoonCard key={cs.id} cs={cs} />)}
          </div>
          <button className="neve-navbtn deck-arrow" onClick={() => scrollByCard(1)} aria-label="Next">
            <Arrow />
          </button>
        </div>
      </div>

      <Footer />
    </div>
  );
}

/* ===================================================================== */
/* Top nav — transparent over the page, frosted opaque once scrolled      */
/* ===================================================================== */
function NavBar({ stage, scrolled, onWordmark, onPortfolio, onAbout, onBlog }) {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const onAboutPage = stage === 'about';
  const onPortfolioArea = stage === 'identity' || stage === 'role' || stage === 'post';
  const onBlogArea = stage === 'blog' || stage === 'blogpost';
  // Close the mobile menu whenever the page changes.
  React.useEffect(() => { setMenuOpen(false); }, [stage]);
  const linkBase = {
    fontFamily: 'var(--font-body)', fontSize: 14.5, lineHeight: 1,
    background: 'none', border: 'none', cursor: 'pointer', padding: '8px 2px',
    transition: 'var(--transition-fast)', whiteSpace: 'nowrap',
  };
  const navLink = (active, onClick, label) => (
    <button
      onClick={onClick}
      onMouseEnter={(e) => { if (!active) e.currentTarget.style.color = 'var(--neve-ink-navy)'; }}
      onMouseLeave={(e) => { if (!active) e.currentTarget.style.color = 'var(--text-secondary)'; }}
      style={{
        ...linkBase,
        color: active ? 'var(--neve-ink-navy)' : 'var(--text-secondary)',
        fontWeight: active ? 600 : 400,
      }}>{label}</button>
  );
  return (
    <header style={{
      position: 'absolute', top: 0, left: 0, right: 0, zIndex: 20, height: 60,
      display: 'flex', alignItems: 'center',
      background: scrolled ? 'rgba(247,245,242,0.82)' : 'transparent',
      backdropFilter: scrolled ? 'saturate(180%) blur(12px)' : 'none',
      WebkitBackdropFilter: scrolled ? 'saturate(180%) blur(12px)' : 'none',
      borderBottom: `1px solid ${scrolled ? 'var(--border-default)' : 'transparent'}`,
      boxShadow: scrolled ? '0 1px 14px rgba(15,23,42,0.06)' : 'none',
      transition: 'background 320ms var(--ease-calm), border-color 320ms var(--ease-calm), box-shadow 320ms var(--ease-calm)',
    }}>
      <div style={{
        width: '100%', maxWidth: 1200, margin: '0 auto',
        padding: '0 clamp(16px, 4vw, 40px)',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div
          onClick={onWordmark}
          style={{
            display: 'flex', alignItems: 'center', gap: 10,
            cursor: 'pointer', flexShrink: 0,
          }}>
          <img src="images/neve-icon-light.svg" alt="NEVE" width="34" height="34"
            style={{ display: 'block', width: 34, height: 34 }} />
          <span style={{
            fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 'clamp(17px, 3.4vw, 22px)',
            letterSpacing: '0.12em', color: 'var(--neve-ink-navy)', opacity: 0.92,
            lineHeight: 1, whiteSpace: 'nowrap',
          }}>NEVE</span>
        </div>

        <nav style={{ display: 'flex', alignItems: 'center' }}>
          <button
            className="nav-burger" aria-label="Menu" aria-expanded={menuOpen}
            onClick={() => setMenuOpen((o) => !o)}
            style={{
              background: 'none', border: 'none', cursor: 'pointer', padding: 8,
              color: 'var(--neve-ink-navy)', lineHeight: 0,
            }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.85" strokeLinecap="round">
              {menuOpen ? <path d="M6 6l12 12M18 6L6 18" /> : <path d="M4 7h16M4 12h16M4 17h16" />}
            </svg>
          </button>

          {menuOpen ? (
            <div onClick={() => setMenuOpen(false)} style={{ position: 'fixed', inset: 0, background: 'transparent' }} />
          ) : null}

          <div className={'nav-links' + (menuOpen ? ' open' : '')} onClick={() => setMenuOpen(false)}>
          {navLink(onAboutPage, onAbout, 'About me')}
          {navLink(onPortfolioArea, onPortfolio, 'Portfolio')}
          {navLink(onBlogArea, onBlog, 'Blog')}

          <a href={CV_URL} download
            style={{
              display: 'inline-flex', alignItems: 'center', gap: 7,
              fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 500, lineHeight: 1,
              textDecoration: 'none', color: 'var(--neve-ink-navy)',
              padding: '8px 16px', borderRadius: 'var(--radius-full)',
              border: '1px solid var(--border-strong)', background: 'var(--surface-card)',
              transition: 'var(--transition-fast)',
            }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = 'var(--neve-ink-navy)'; e.currentTarget.style.boxShadow = 'var(--shadow-1)'; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = 'var(--border-strong)'; e.currentTarget.style.boxShadow = 'none'; }}>
            CV
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.85" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 3v12M7 11l5 5 5-5M5 21h14" />
            </svg>
          </a>
          </div>
        </nav>
      </div>
    </header>
  );
}

/* ===================================================================== */
/* Root                                                                  */
/* ===================================================================== */
function App() {
  // Restore the saved view on refresh / forward-nav (history.state survives reload).
  const restored = (typeof history !== 'undefined' && history.state && history.state._neve) ? history.state : null;
  const [stage, setStage] = React.useState(restored ? restored.stage : 'intro'); // intro | question | identity | role | post | blog | blogpost | about | admin
  const [source, setSource] = React.useState(null);
  const [role, setRole] = React.useState(restored ? (restored.role || null) : null);
  const [post, setPost] = React.useState(restored ? (restored.post || null) : null);          // open case study
  const [blogPost, setBlogPost] = React.useState(restored ? (restored.blogPost || null) : null);  // open blog article
  const [scrolled, setScrolled] = React.useState(false);
  const [answered, setAnswered] = React.useState(restored ? !['intro', 'question'].includes(restored.stage) : false); // questionnaire seen — skip it on return
  const [store, setStore] = React.useState(() => loadStore()); // localStorage content override

  // Effective (admin-edited or default) content; public views show only published.
  const roleProjects = effectiveRoleProjects(store);
  const currentProjects = role ? (roleProjects[role.id] || []).filter(isPublished) : [];
  const publishedBlog = effectiveBlog(store).filter(isPublished);

  const persist = (next) => { setStore(next); saveStore(next); };

  // ---- Browser-history navigation -------------------------------------
  // Each forward move pushes a history entry carrying a serializable snapshot
  // of the view, so the browser's native Back/Forward (and refresh) work.
  // Sections without sub-state (intro/identity/blog/about) de-dupe on re-click.
  const SINGLETON = ['intro', 'identity', 'blog', 'about'];
  const pushView = (next, patch = {}) => {
    const { role: r = null, post: p = null, blogPost: bp = null } = patch;
    setStage(next); setRole(r); setPost(p); setBlogPost(bp);
    if (typeof history === 'undefined') return;
    const cur = history.state;
    if (cur && cur.stage === next && SINGLETON.includes(next)) return; // re-click same section
    const depth = ((cur && cur.depth) || 0) + 1;
    history.pushState({ stage: next, role: r, post: p, blogPost: bp, depth, _neve: true }, '');
  };
  // On-page "back" buttons defer to the browser history so it stays in sync;
  // if we're at the first entry (e.g. a deep-linked refresh) fall back explicitly.
  const goBack = (fallbackStage, fallbackPatch) => {
    if (typeof history !== 'undefined' && history.state && history.state.depth > 0) window.history.back();
    else pushView(fallbackStage, fallbackPatch);
  };

  const goPortfolio = () => pushView('identity');
  const goWelcome = () => pushView('intro');
  const goBlog = () => pushView('blog');
  // From the welcome page: first time → questionnaire; afterwards → straight to the deck.
  const enterFromWelcome = () => pushView(answered ? 'identity' : 'question');

  // Track scroll of whichever stage's scroll container is active (scroll doesn't
  // bubble, so listen in the capture phase to catch any descendant scroller).
  React.useEffect(() => {
    const onScroll = (e) => { setScrolled(((e.target && e.target.scrollTop) || 0) > 8); };
    document.addEventListener('scroll', onScroll, true);
    return () => document.removeEventListener('scroll', onScroll, true);
  }, []);
  // New stage always starts at the top — reset the nav to transparent.
  React.useEffect(() => { setScrolled(false); }, [stage]);

  // Seed a root history entry (only on a fresh visit) so the first Back leaves
  // the site rather than getting stuck, and Back/Forward restore saved views.
  React.useEffect(() => {
    if (typeof history === 'undefined') return;
    if (!(history.state && history.state._neve)) {
      history.replaceState({ stage: 'intro', role: null, post: null, blogPost: null, depth: 0, _neve: true }, '');
    }
    const onPop = (e) => {
      const s = (e.state && e.state._neve) ? e.state : { stage: 'intro', role: null, post: null, blogPost: null };
      setStage(s.stage); setRole(s.role || null); setPost(s.post || null); setBlogPost(s.blogPost || null);
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  const chromeless = stage === 'intro';

  return (
    <div style={{ position: 'absolute', inset: 0 }}>
      {!chromeless ? (
        <NavBar
          stage={stage}
          scrolled={scrolled}
          onWordmark={goWelcome}
          onPortfolio={goPortfolio}
          onBlog={goBlog}
          onAbout={() => pushView('about')}
        />
      ) : null}

      <div style={{ position: 'absolute', inset: 0, opacity: stage === 'intro' ? 1 : 0, pointerEvents: stage === 'intro' ? 'auto' : 'none', transition: 'opacity 500ms var(--ease-calm)' }}>
        {stage === 'intro' ? <ParticleFigure onEnter={enterFromWelcome} /> : null}
      </div>

      {stage === 'question' ? (
        <QuestionCard onSubmit={(s) => { setSource(s); logSurvey(s); setAnswered(true); pushView('identity'); }} />
      ) : null}

      {stage === 'identity' ? (
        <IdentityDeck onChoose={(r) => pushView('role', { role: r })} />
      ) : null}

      {stage === 'role' && role ? (
        <RolePage
          role={role}
          projects={currentProjects}
          onBack={() => goBack('identity')}
          onOpenPost={(p) => pushView('post', { role, post: p })}
        />
      ) : null}

      {stage === 'post' && role && post ? (
        <BlogPost
          role={role}
          post={post}
          backLabel={role.title}
          onBack={() => goBack('role', { role })}
        />
      ) : null}

      {stage === 'blog' ? (
        <BlogList
          posts={publishedBlog}
          onOpen={(p) => pushView('blogpost', { blogPost: p })}
        />
      ) : null}

      {stage === 'blogpost' && blogPost ? (
        <BlogPost
          post={blogPost}
          backLabel="All writing"
          onBack={() => goBack('blog')}
        />
      ) : null}

      {stage === 'about' ? (
        <AboutPage onExplore={goPortfolio} />
      ) : null}

    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
